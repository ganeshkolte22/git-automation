#load_module modules/ngx_http_js_module.so;
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
      limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=1r/s;
    limit_req_status 429;
    limit_req_log_level warn;

    proxy_cache_path /var/cache/nginx
                levels=1:2
                 keys_zone=portal_cache:10m
                 max_size=100m
                 inactive=60m
                 use_temp_path=off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    log_format oidc_claims escape=json
    '{'
      '"arg":"$args",'
      '"time":"$time_iso8601",'
      '"client_ip":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"sub":"$oidc_claim_sub",'
      '"oid":"$oidc_claim_oid",'
      '"tid":"$oidc_claim_tid",'
      '"name":"$oidc_claim_name",'
      '"email":"$oidc_claim_email",'
      '"preferred_username":"$oidc_claim_preferred_username",'
      #'"jwt_appid":"$jwt_claim_appid",'
      #'"jwt_azp":"$jwt_claim_azp",'
      #'"app_id_key":"$app_id",'
      '"limit_status":"$limit_req_status",'
      '"oidc_userinfo": "$oidc_userinfo",'
      #'"oidc_id_token": "$oidc_id_token",'
      #'"oidc_access_token": "$oidc_access_token",'
    '}';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;
    server_tokens "";
    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;
